name: CI Test
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run single test
        run: |
          python -m pytest tests/test_datetimeutil.py::TestTimeParsing -v --tb=short 2>&1 | head -100
